services:
  mcp-browser:
    build: .
    container_name: mcp-browser
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_KEY=${API_KEY:-test-api-key-12345}
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEADLESS=true
      - NO_SANDBOX=true
      - CHROMIUM_PATH=/usr/bin/chromium-browser
      - SCREENSHOT_QUALITY=${SCREENSHOT_QUALITY:-80}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-30m}
      - MAX_CONCURRENT_PAGES=${MAX_CONCURRENT_PAGES:-10}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - /dev/shm:/dev/shm
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
